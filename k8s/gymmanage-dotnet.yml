apiVersion: v1
kind: ConfigMap
metadata:
  name: gymmanage-dotnet-config
  namespace: gymmanage-dotnet
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:18091"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gymmanage-dotnet
  namespace: gymmanage-dotnet
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gymmanage-dotnet
  template:
    metadata:
      labels:
        app: gymmanage-dotnet
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: gymmanage-dotnet
          image: docker.io/hung16/gymmanage-app:f566e0a
          imagePullPolicy: Always
          ports:
            - containerPort: 18091
          envFrom:
            - configMapRef:
                name: gymmanage-dotnet-config
            - secretRef:
                name: gymmanage-dotnet-secret
          readinessProbe:
            tcpSocket:
              port: 18091
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 18091
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gymmanage-dotnet-service
  namespace: gymmanage-dotnet
spec:
  type: NodePort
  selector:
    app: gymmanage-dotnet
  ports:
    - name: http
      port: 80
      targetPort: 18091
      nodePort: 32390
