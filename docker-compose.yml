services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gymmanage-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "127.0.0.1:${SQL_PORT}:1433"
    volumes:
      - gymmanage_sqlserver_data:/var/opt/mssql

  app:
    build:
      context: .
    container_name: gymmanage-app
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${APP_DB};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
    ports:
      - "${APP_PORT}:8080"
    depends_on:
      - sqlserver

volumes:
  gymmanage_sqlserver_data:
